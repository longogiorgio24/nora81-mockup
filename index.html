  * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Roboto', sans-serif; background: #f0f0f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .kit-card { border: 2px solid #e0e0e0; border-radius: 10px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.15s; }

  .kit-card .num { font-size: 28px; font-weight: 700; color: #333; }

  .kit-card.k1 .num { color: #D32F2F; }
    .kit-card.k2 .num { color: #1565C0; }
  .kit-card.k3 .num { color: #00838F; }
  .kit-card.k4 .num { color: #2E7D32; }

  .btn-section { padding: 20px; }
  .btn-confirm { width: 100%; padding: 14px; background: #D32F2F; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; opacity: 0.3; pointer-events: none; }
    .btn-confirm.active { opacity: 1; pointer-events: auto; }
</style>
